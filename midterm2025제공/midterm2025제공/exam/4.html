<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>홈런!</title>
    <style>
      .field {
        width: 300px;
        height: 300px;
        border: 3px solid #333;
        background: radial-gradient(circle at center, #8bc34a 40%, #4caf50 60%);
        margin: 40px auto;
      }

      .infield {
        width: 100px;
        height: 100px;
        background: #a1887f;
        box-shadow: 0 0 0 3px #795548 inset;
      }

      .home-plate {
        width: 10px;
        height: 10px;
        background: white;
        border: 1px solid #444;
      }
    </style>
  </head>
  <body>
    <div class="field">
      <div class="infield"></div>
      <div class="home-plate">
        <img
          width="15px"
          src="https://pngimg.com/uploads/baseball/baseball_PNG19024.png"
        />
      </div>
    </div>
  </body>
</html>
