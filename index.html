<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>웹 프로그래밍 참고 자료</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Malgun Gothic", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #181825;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      font-size: 13px;
      font-weight: bold;
      color: #89b4fa;
      border-bottom: 1px solid #313244;
      letter-spacing: 0.5px;
    }

    /* 탭 */
    #tabs {
      display: flex;
      border-bottom: 1px solid #313244;
    }

    .tab {
      flex: 1;
      padding: 8px 4px;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      color: #6c7086;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: #cdd6f4; }
    .tab.active { color: #89b4fa; border-bottom-color: #89b4fa; }

    /* 검색 */
    #search-box {
      padding: 8px 10px;
      border-bottom: 1px solid #313244;
    }

    #search {
      width: 100%;
      padding: 5px 8px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 12px;
      outline: none;
    }

    #search:focus { border-color: #89b4fa; }
    #search::placeholder { color: #6c7086; }

    /* 메뉴 목록 */
    #menu {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    #menu::-webkit-scrollbar { width: 4px; }
    #menu::-webkit-scrollbar-track { background: transparent; }
    #menu::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }

    .menu-section {
      display: none;
    }
    .menu-section.visible { display: block; }

    .menu-group-label {
      padding: 8px 14px 3px;
      font-size: 10px;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: bold;
    }

    .menu-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 5px 14px 5px 20px;
      font-size: 12px;
      color: #a6adc8;
      background: none;
      border: none;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu-btn:hover {
      background: #313244;
      color: #cdd6f4;
    }

    .menu-btn.active {
      background: #1e3a5f;
      color: #89b4fa;
      border-left-color: #89b4fa;
    }

    /* ── 메인 콘텐츠 ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #content-header {
      padding: 10px 20px;
      background: #181825;
      border-bottom: 1px solid #313244;
      font-size: 13px;
      color: #6c7086;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #content-header span { color: #89b4fa; font-weight: bold; }

    #iframe-container {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── 빈 화면 ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #45475a;
    }

    #welcome h2 { font-size: 20px; color: #585b70; }
    #welcome p  { font-size: 13px; }

    /* 빠른 접근 버튼 */
    #quick-btns {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .quick-btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .quick-btn:hover, .quick-btn.active {
      background: #1e3a5f;
      border-color: #89b4fa;
      color: #89b4fa;
    }
  </style>
</head>

    <iframe id="viewer" src=""></iframe>

</div>

<script>
  // md 파일의 헤딩을 anchor id로 변환하는 함수 (GitHub Flavored Markdown 규칙)
  function toAnchor(text) {
    return text
      .toLowerCase()
      .replace(/[^\w\s\uAC00-\uD7A3ㄱ-ㅎㅏ-ㅣ-]/g, '')  // 특수문자 제거 (한글 유지)
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
  }

  // 섹션 제목 → md 파일 내 헤딩 id 매핑 (직접 지정)
  const anchorMap = {
    // html.md
    '문서 구조': 'section-doc',
    '텍스트 / 인라인 요소': 'section-text',
    '목록': 'section-list',
    '링크 / 미디어': 'section-link',
    '테이블': 'section-table',
    '폼 (Form)': 'section-form',
    'input 태그': 'section-input',
    'iframe': 'section-iframe',
    '레이아웃 / 컨테이너': 'section-layout',
    '선택자 우선순위': 'section-specificity',
    '색상 / 배경': 'section-color',
    '텍스트 스타일': 'section-textstyle',
    '박스 모델': 'section-boxmodel',
    'CSS 단위': 'section-unit',
    'display 속성': 'section-display',
    'position 속성': 'section-position',
    'z-index': 'section-zindex',
    '테이블 CSS': 'section-tablecss',
    '선택자': 'section-selector',
    '애니메이션 / 트랜지션': 'section-animation',
    '기타 CSS': 'section-misc',
    '인라인 스타일': 'section-inline',
  };

  let currentFile = null;
  let currentSection = null;

  function go(btn, file, section) {
    // 활성 버튼 표시
    document.querySelectorAll('.menu-btn, .quick-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    currentFile = file;
    currentSection = section;

    // 헤더 업데이트
    document.getElementById('header-file').textContent = file;
    document.getElementById('header-sep').style.display = 'inline';
    document.getElementById('header-section').textContent = section;

    // welcome 숨기고 iframe 보이기
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('iframe-container').style.display = 'block';

    // md 파일을 viewer.html에 로드 (anchor 포함)
    const anchor = encodeURIComponent(section);
    document.getElementById('viewer').src = `viewer.html?file=${file}&section=${anchor}`;
  }

  // html 파일 직접 iframe에 열기
  function goFile(btn, file) {
    document.querySelectorAll('.menu-btn, .quick-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    document.getElementById('header-file').textContent = file;
    document.getElementById('header-sep').style.display = 'inline';
    document.getElementById('header-section').textContent = '직접 실행';

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('iframe-container').style.display = 'block';
    document.getElementById('viewer').src = file;
  }

  // 탭 전환
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');

    document.querySelectorAll('.menu-section').forEach(s => {
      s.classList.toggle('visible', s.dataset.tab === tab);
    });

    // 검색 초기화
    document.getElementById('search').value = '';
    filterMenu('');
  }

  // 메뉴 검색 필터
  function filterMenu(query) {
    const q = query.trim().toLowerCase();
    document.querySelectorAll('.menu-btn').forEach(btn => {
      const match = !q || btn.textContent.toLowerCase().includes(q);
      btn.style.display = match ? '' : 'none';
    });
    // 섹션 라벨: 하위 버튼이 하나라도 보이면 표시
    document.querySelectorAll('.menu-group-label').forEach(label => {
      let next = label.nextElementSibling;
      let anyVisible = false;
      while (next && !next.classList.contains('menu-group-label')) {
        if (next.style.display !== 'none') anyVisible = true;
        next = next.nextElementSibling;
      }
      label.style.display = anyVisible ? '' : 'none';
    });
  }
</script>

</body>
</html>
