<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Q3</title>
  </head>
  <script>
    function calculateAverage(scores) {
      // for 구문을 이용하여 완성하세요
      let sum;
      sum=0;
      for(i=0;i<scores.length;i++){
        sum=sum+scores[i];
      }
      return sum/scores.length;
    }

    function calculateAverage2(scores) {
      // for..of 구문을 이용하여 완성하세요
      let sum;
      sum=0;
      for(ch of scores){
        sum=sum+ch;
      }
      return sum/scores.length;
    }

    function calculateAverage3(scores) {
      // forEach 구문을 이용하여 완성하세요
      let sum;
      sum=0;
      scores.forEach(element=>{
        sum=sum+element;
      });
      return sum/scores.length;
    }
   
  </script>
  <body>
    <script>
      // Test Code. 수정 불가.
      const studentScores = [85, 92, 78, 95];

      let averageScore = calculateAverage(studentScores);
      console.log("Average Score:", averageScore);

      averageScore = calculateAverage2(studentScores);
      console.log("Average Score:", averageScore);

      averageScore = calculateAverage3(studentScores);
      console.log("Average Score:", averageScore);
    </script>
  </body>
</html>
