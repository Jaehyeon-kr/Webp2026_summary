<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Document</title>
    <script>
  
      function facSum() {
        let len,paclist,last,sum;

        len=prompt("리스트의 길이를 입력하세요:");

        paclist=[];
        last=1;
        sum=0;
        for(i=1;i<(parseInt(len)+1);i++){
          last=last*i
          paclist.push(last);
        }
        for(i=0;i<paclist.length;i++){
          sum=sum+paclist[i];
        }

        console.log("List",paclist);
        console.log("합계: ",sum);
      }

      // 테스트 코드
      facSum();
    </script>
  </head>
  <body></body>
</html>
