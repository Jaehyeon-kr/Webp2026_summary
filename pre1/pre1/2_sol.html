<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    table, td { /* 경계선 스타일 */
      border: double 3px blue; /* double 효과 */
    }

    td {
      background-color: white;
    }

    table {
      width: 500px;
      height: 500px;
      text-align: center; /* 글자 가운데 정렬 */
      background-color: skyblue; /* 테이블 내부 배경 색상 */
      padding: 10px; /* 가로 세로 패딩 */
    }

    /* 대각선 방향 검은 셀 (예: 3행 3열, 5행 5열) */
    tr:nth-child(3) td:nth-child(3) {
      background-color: black;
    }
    tr:nth-child(5) td:nth-child(5) {
      background-color: black;
    }
  </style>
</head>

<body>
  <table>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>

    </tr>
  </table>
</body>

</html>
